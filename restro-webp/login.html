<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Royal Cuisine</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">
  <div class="login-box">
    <h2>Welcome Back</h2>
    <p>Login to Royal Cuisine</p>

    <form onsubmit="loginUser(event)">
  <input type="email" id="email" placeholder="Email Address" required>
  <input type="password" id="password" placeholder="Password" required>

  <button type="submit">Login</button>
</form>
<p id="login-message" style="margin-top:15px; color:#c59d5f;"></p>

    <span class="extra">
      Don’t have an account? <a href="#">Sign Up</a>
    </span>
  </div>
</div>
<script>
  function loginUser(event) {
    event.preventDefault(); // stop page reload

    // demo credentials
    const correctEmail = "admin@royalcuisine.com";
    const correctPassword = "12345";

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const message = document.getElementById("login-message");

    if (email === correctEmail && password === correctPassword) {
      message.textContent = "Login Successful! Redirecting...";
      
      setTimeout(() => {
        window.location.href = "index.html";
      }, 1500);
    } else {
      message.textContent = "Invalid credentials. Please try again.";
    }
  }
</script>

</body>
</html>
